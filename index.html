<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngành IT- Nguyễn Hoàng Dương</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* ===== BACKGROUND ===== */
.header{
    height:100vh;
    background:url("ảnh 2.jpg") no-repeat center/cover;
    position:relative;
    overflow:hidden;
}

/* ánh sáng nền */
.header::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    animation:lightMove 10s infinite alternate;
}

@keyframes lightMove{
    from{transform:translate(-20%,-20%);}
    to{transform:translate(0,0);}
}

/* ===== PARTICLE ===== */
.particle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:fly linear infinite;
}

@keyframes fly{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* ===== NAVBAR ===== */
.navbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:15px;
    z-index:2;
    flex-wrap:wrap;
}

.navbar a{
    margin:5px;
    padding:8px 15px;
    background:white;
    border-radius:20px;
    text-decoration:none;
    color:black;
    font-weight:bold;
    transition:0.3s;
}

.navbar a:hover{
    transform:scale(1.1);
}

/* ===== HAMBURGER ===== */
.hamburger{
    position:absolute;
    top:15px;
    left:15px;
    font-size:28px;
    color:white;
    cursor:pointer;
    z-index:5;
}

/* ===== AVATAR ===== */
.avatar{
    position:absolute;
    top:15px;
    right:15px;

    width:110px;
    height:110px;
    border-radius:50%;

    background:url("ảnh 1.jpg") no-repeat center/cover;

    border:3px solid white;

    box-shadow:
        0 0 10px rgba(255,255,255,0.6),
        0 0 20px rgba(255,255,255,0.3);

    z-index:5;
    transition:0.3s;
}

.avatar:hover{
    transform:scale(1.05);
}

/* ===== MENU ===== */
.menu-box{
    position:fixed;
    top:100px;
    left:-260px;
    width:240px;
    height:300px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    border-radius:15px;
    transition:0.4s;
    z-index:10;
    padding-top:40px;
}

.drag-bar{
    position:absolute;
    top:0;
    width:100%;
    height:35px;
    background:rgba(255,255,255,0.1);
    cursor:grab;
}

.menu-box a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
}

.menu-box a:hover{
    background:rgba(255,255,255,0.2);
}

/* ===== FOOTER CHỮ CHÌM ===== */
.footer{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;

    color:rgba(255,255,255,0.6);
    font-size:14px;

    text-shadow:0 0 10px rgba(255,255,255,0.3);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .avatar{
        width:65px;
        height:65px;
        top:10px;
        right:10px;
    }

    .navbar{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<!-- PARTICLE -->
<script>
for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<!-- MENU -->
<div class="menu-box" id="menu">
    <div class="drag-bar" id="dragBar"></div>
    <a href="index.html">🏠 Trang chủ</a>
    <a href="ngành.html">Ngành</a>
    <a href="cohoi.html">Cơ hội</a>
    <a href="thachthuc.html">Thách thức</a>
</div>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- HEADER -->
<div class="header">

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="index.html">Trang chủ</a>
        <a href="ngành.html">Ngành</a>
        <a href="cohoi.html">Cơ hội</a>
        <a href="thachthuc.html">Thách thức</a>
    </div>

    <!-- AVATAR -->
    <div class="avatar"></div>

    <!-- FOOTER -->
    <footer class="footer">
        Thiết kế bởi Nguyễn Hoàng Dương - Bài thi cuối học kì II
    </footer>

</div>

<script>
function toggleMenu(){
    let menu=document.getElementById("menu");
    menu.style.left=(menu.style.left==="0px")?"-260px":"0px";
}

/* DRAG MENU */
let menu=document.getElementById("menu");
let dragBar=document.getElementById("dragBar");

let isDragging=false, offsetY;

dragBar.onmousedown=function(e){
    isDragging=true;
    offsetY=e.clientY-menu.offsetTop;
};

document.onmousemove=function(e){
    if(isDragging){
        menu.style.top=(e.clientY-offsetY)+"px";
    }
};

document.onmouseup=function(){
    isDragging=false;
};
</script>

</body>
</html>
